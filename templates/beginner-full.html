<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<meta name="theme-color" content="#667eea">
<title>🌱 Beginner Language Lab - Learn Parts of Speech</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 16px;
    }

    .container {
        max-width: 1400px;
        margin: 0 auto;
    }

    /* Header */
    .header {
        background: white;
        border-radius: 24px;
        padding: 16px 20px;
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .logo h1 {
        font-size: 1.2rem;
        background: linear-gradient(135deg, #667eea, #764ba2);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }

    .logo p {
        font-size: 0.6rem;
        color: #6b7280;
    }

    .back-btn {
        background: #f3f4f6;
        padding: 8px 16px;
        border-radius: 30px;
        text-decoration: none;
        color: #4f46e5;
        font-weight: 600;
        font-size: 0.85rem;
        transition: all 0.3s;
    }

    .back-btn:active {
        transform: scale(0.95);
    }

    .language-info {
        background: #f3f4f6;
        padding: 6px 12px;
        border-radius: 30px;
        font-weight: 600;
        font-size: 0.8rem;
        color: #4f46e5;
    }

    /* Stats Grid - Mobile Friendly */
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        margin-bottom: 20px;
    }

    .stat-card {
        background: white;
        border-radius: 16px;
        padding: 12px;
        text-align: center;
        box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }

    .stat-value {
        font-size: 1.5rem;
        font-weight: 800;
        color: #4f46e5;
    }

    .stat-label {
        font-size: 0.6rem;
        color: #6b7280;
        margin-top: 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    /* Level Selector - Mobile Friendly */
    .level-selector {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }

    .level-btn {
        padding: 8px 20px;
        background: white;
        border: 2px solid #e5e7eb;
        border-radius: 40px;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.8rem;
        transition: all 0.3s;
    }

    .level-btn.active {
        background: linear-gradient(135deg, #667eea, #764ba2);
        border-color: transparent;
        color: white;
    }

    /* Language Selector - Mobile Friendly */
    .language-selector {
        display: flex;
        gap: 8px;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 20px;
    }

    .lang-chip {
        background: white;
        padding: 6px 14px;
        border-radius: 30px;
        cursor: pointer;
        transition: all 0.3s;
        border: 1px solid #e5e7eb;
        font-weight: 500;
        font-size: 0.75rem;
    }

    .lang-chip.active {
        background: #4f46e5;
        color: white;
        border-color: #4f46e5;
    }

    .lang-chip:active {
        transform: scale(0.95);
    }

    /* Main Learning Card */
    .learning-card {
        background: white;
        border-radius: 28px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Steps - Mobile Friendly */
    .steps-container {
        display: flex;
        justify-content: space-between;
        margin-bottom: 25px;
        flex-wrap: wrap;
        gap: 6px;
    }

    .step {
        flex: 1;
        text-align: center;
        padding: 8px 4px;
        background: #f9fafb;
        border-radius: 16px;
        cursor: pointer;
        transition: all 0.3s;
        min-width: 50px;
    }

    .step.active {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
    }

    .step.completed {
        background: #10b981;
        color: white;
    }

    .step-icon {
        font-size: 1.2rem;
    }

    .step-label {
        font-size: 0.55rem;
        font-weight: 600;
        margin-top: 4px;
    }

    /* Word Display */
    .word-display {
        text-align: center;
        margin: 20px 0;
    }

    .word-text {
        font-size: 2.5rem;
        font-weight: 800;
        background: linear-gradient(135deg, #1f2937, #4f46e5);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 10px;
        word-break: break-word;
    }

    .pos-badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 30px;
        font-size: 0.7rem;
        font-weight: 600;
        color: white;
    }

    .pos-noun { background: #ef4444; }
    .pos-verb { background: #10b981; }
    .pos-adjective { background: #f59e0b; }
    .pos-adverb { background: #8b5cf6; }
    .pos-pronoun { background: #ec489a; }
    .pos-preposition { background: #06b6d4; }

    /* Meaning Box */
    .meaning-box {
        background: #f0fdf4;
        border-radius: 16px;
        padding: 15px;
        margin: 15px 0;
        border-left: 4px solid #10b981;
    }

    .meaning-text {
        font-size: 0.95rem;
        color: #1f2937;
        line-height: 1.5;
    }

    /* Example Box */
    .example-box {
        background: #fefce8;
        border-radius: 16px;
        padding: 15px;
        margin: 15px 0;
        cursor: pointer;
        transition: all 0.3s;
        text-align: center;
        border: 1px solid #fde047;
    }

    .example-box:active {
        background: #fef08a;
        transform: scale(0.98);
    }

    /* Input Fields */
    .input-field {
        width: 100%;
        max-width: 100%;
        padding: 14px 18px;
        border: 2px solid #e5e7eb;
        border-radius: 50px;
        font-size: 0.9rem;
        text-align: center;
        margin: 15px 0;
        display: block;
    }

    .input-field:focus {
        outline: none;
        border-color: #667eea;
    }

    textarea {
        width: 100%;
        padding: 12px;
        border: 2px solid #e5e7eb;
        border-radius: 16px;
        font-size: 0.9rem;
        font-family: inherit;
        resize: vertical;
        margin: 15px 0;
    }

    textarea:focus {
        outline: none;
        border-color: #667eea;
    }

    /* Buttons */
    .btn-group {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 20px;
    }

    .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 50px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s;
        font-size: 0.8rem;
    }

    .btn-primary {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
    }

    .btn-success {
        background: #10b981;
        color: white;
    }

    .btn-outline {
        background: transparent;
        border: 2px solid #e5e7eb;
        color: #374151;
    }

    .btn:active {
        transform: scale(0.96);
    }

    /* Multiple Choice */
    .choices {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin: 15px 0;
    }

    .choice {
        background: #f9fafb;
        padding: 12px 16px;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s;
        text-align: center;
        border: 1px solid #e5e7eb;
        font-size: 0.85rem;
    }

    .choice:active {
        transform: scale(0.98);
    }

    .choice.correct {
        background: #10b981;
        color: white;
    }

    .choice.wrong {
        background: #ef4444;
        color: white;
    }

    /* Scramble Letters */
    .scramble-area {
        display: flex;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
        margin: 20px 0;
    }

    .scramble-letter {
        width: 55px;
        height: 55px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        font-weight: 800;
        color: white;
        cursor: pointer;
        transition: all 0.2s;
    }

    .scramble-letter:active {
        transform: scale(0.95);
    }

    /* Feedback */
    .feedback {
        margin-top: 15px;
        padding: 12px 16px;
        border-radius: 16px;
        text-align: center;
        font-size: 0.85rem;
    }

    .feedback.correct {
        background: #d1fae5;
        color: #065f46;
        border-left: 4px solid #10b981;
    }

    .feedback.wrong {
        background: #fee2e2;
        color: #991b1b;
        border-left: 4px solid #ef4444;
    }

    .feedback.info {
        background: #dbeafe;
        color: #1e40af;
        border-left: 4px solid #3b82f6;
    }

    /* Progress Bar */
    .progress-section {
        background: #f9fafb;
        border-radius: 14px;
        padding: 12px;
        margin-bottom: 20px;
    }

    .progress-header {
        display: flex;
        justify-content: space-between;
        font-size: 0.7rem;
        color: #6b7280;
        margin-bottom: 6px;
    }

    .progress-bar {
        height: 6px;
        background: #e5e7eb;
        border-radius: 10px;
        overflow: hidden;
    }

    .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #667eea, #764ba2);
        border-radius: 10px;
        width: 0%;
        transition: width 0.5s;
    }

    /* Toast */
    .toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #1f2937;
        color: white;
        padding: 10px 18px;
        border-radius: 30px;
        z-index: 1000;
        font-size: 0.8rem;
        white-space: nowrap;
    }

    /* Tip Box */
    .tip-box {
        background: #fef3c7;
        border-radius: 14px;
        padding: 12px;
        margin: 15px 0;
        text-align: center;
        font-size: 0.8rem;
    }

    /* Loading Spinner */
    .loading-spinner {
        display: inline-block;
        width: 30px;
        height: 30px;
        border: 3px solid #e5e7eb;
        border-radius: 50%;
        border-top-color: #667eea;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* Confetti Animation */
    .confetti {
        position: fixed;
        width: 8px;
        height: 8px;
        background: #f59e0b;
        animation: confettiFall 2s linear forwards;
        z-index: 9999;
        pointer-events: none;
    }

    @keyframes confettiFall {
        to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }

    /* Tablet and Desktop */
    @media (min-width: 768px) {
        body {
            padding: 24px;
        }
        
        .stats-grid {
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }
        
        .stat-value {
            font-size: 2rem;
        }
        
        .word-text {
            font-size: 4rem;
        }
        
        .step-label {
            font-size: 0.7rem;
        }
        
        .learning-card {
            padding: 35px;
        }
        
        .scramble-letter {
            width: 70px;
            height: 70px;
            font-size: 2rem;
        }
    }
</style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <h1>🌱 Beginner Language Lab</h1>
            <p>Learn Parts of Speech • Master Vocabulary</p>
        </div>
        <a href="/" class="back-btn">← Back</a>
        <div class="language-info" id="languageInfo">🇬🇧 Learning English</div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-value" id="totalPoints">0</div><div class="stat-label">🏆 Points</div></div>
        <div class="stat-card"><div class="stat-value" id="streakCount">0</div><div class="stat-label">🔥 Streak</div></div>
        <div class="stat-card"><div class="stat-value" id="masteredCount">0</div><div class="stat-label">⭐ Mastered</div></div>
        <div class="stat-card"><div class="stat-value" id="totalWords">0</div><div class="stat-label">📚 Words</div></div>
    </div>

    <!-- Language Selector -->
    <div class="language-selector" id="languageSelector"></div>

    <!-- Level Selector -->
    <div class="level-selector" id="levelSelector"></div>

    <!-- Progress -->
    <div class="progress-section">
        <div class="progress-header"><span>📊 Course Progress</span><span id="progressPercent">0%</span></div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <!-- Learning Steps -->
    <div class="steps-container" id="stepsContainer">
        <div class="step" data-step="1"><div class="step-icon">📖</div><div class="step-label">SEE</div></div>
        <div class="step" data-step="2"><div class="step-icon">✏️</div><div class="step-label">SPELL</div></div>
        <div class="step" data-step="3"><div class="step-icon">❓</div><div class="step-label">MEANING</div></div>
        <div class="step" data-step="4"><div class="step-icon">🔄</div><div class="step-label">SCRAMBLE</div></div>
        <div class="step" data-step="5"><div class="step-icon">✍️</div><div class="step-label">WRITE</div></div>
        <div class="step" data-step="6"><div class="step-icon">🎯</div><div class="step-label">USE</div></div>
    </div>

    <!-- Main Learning Card -->
    <div class="learning-card" id="learningCard">
        <div style="text-align: center; padding: 40px;">
            <div class="loading-spinner"></div>
            <p style="margin-top: 15px;">Loading vocabulary...</p>
        </div>
    </div>
</div>

<script>
    // ==================== TRACK ACTIVITY FOR DASHBOARD ====================
    function trackVocabularyActivity(wordLearned) {
        let todayActivities = JSON.parse(localStorage.getItem('todayActivities') || '{}');
        todayActivities.vocabulary = (todayActivities.vocabulary || 0) + 1;
        todayActivities.lastActivityDate = new Date().toDateString();
        localStorage.setItem('todayActivities', JSON.stringify(todayActivities));
        
        if (window.parent && window.parent !== window) {
            window.parent.postMessage({ 
                type: 'learning_activity', 
                activity: { type: 'vocabulary', word: wordLearned } 
            }, '*');
        }
    }

    // Track study time
    let studyStartTime = Date.now();
    window.addEventListener('beforeunload', function() {
        const minutesStudied = Math.round((Date.now() - studyStartTime) / 60000);
        if (minutesStudied > 0) {
            let todayActivities = JSON.parse(localStorage.getItem('todayActivities') || '{}');
            todayActivities.minutesStudied = (todayActivities.minutesStudied || 0) + minutesStudied;
            todayActivities.lastActivityDate = new Date().toDateString();
            localStorage.setItem('todayActivities', JSON.stringify(todayActivities));
        }
    });

    // ==================== GET LANGUAGE FROM URL / STORAGE ====================
    function getInitialLanguage() {
        // Priority 1: URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const urlLang = urlParams.get('lang');
        if (urlLang) {
            localStorage.setItem('preferredLanguage', urlLang);
            sessionStorage.setItem('selectedLanguage', urlLang);
            return urlLang;
        }
        
        // Priority 2: Session storage (from dashboard)
        const sessionLang = sessionStorage.getItem('selectedLanguage');
        if (sessionLang) {
            localStorage.setItem('preferredLanguage', sessionLang);
            return sessionLang;
        }
        
        // Priority 3: Local storage
        const savedLang = localStorage.getItem('preferredLanguage');
        if (savedLang) return savedLang;
        
        // Default
        return 'en';
    }
    
    // ==================== CONFIGURATION ====================
    const API_BASE = '/api';
    
    // Available languages
    const AVAILABLE_LANGUAGES = [
        { code: 'en', name: 'English', flag: '🇬🇧' },
        { code: 'es', name: 'Español', flag: '🇪🇸' },
        { code: 'fr', name: 'Français', flag: '🇫🇷' },
        { code: 'de', name: 'Deutsch', flag: '🇩🇪' },
        { code: 'it', name: 'Italiano', flag: '🇮🇹' },
        { code: 'pt', name: 'Português', flag: '🇵🇹' },
        { code: 'sw', name: 'Kiswahili', flag: '🇹🇿' },
        { code: 'zh', name: '中文', flag: '🇨🇳' },
        { code: 'ar', name: 'العربية', flag: '🇸🇦' }
    ];
    
    const LEVELS = ['beginner', 'intermediate', 'advanced'];
    const LEVEL_NAMES = { beginner: '🌱 Beginner', intermediate: '📚 Intermediate', advanced: '🌟 Advanced' };
    
    const POS_INFO = {
        noun: { label: 'Noun', color: '#ef4444', description: 'Names a person, place, thing, or idea' },
        verb: { label: 'Verb', color: '#10b981', description: 'Shows action or state of being' },
        adjective: { label: 'Adjective', color: '#f59e0b', description: 'Describes a noun' },
        adverb: { label: 'Adverb', color: '#8b5cf6', description: 'Describes a verb, adjective, or another adverb' },
        pronoun: { label: 'Pronoun', color: '#ec489a', description: 'Replaces a noun (I, you, he, she, it)' },
        preposition: { label: 'Preposition', color: '#06b6d4', description: 'Shows relationship between words' }
    };
    
    // ==================== GLOBAL STATE ====================
    let currentLanguage = getInitialLanguage();
    let currentLevel = localStorage.getItem('userLevel') || 'beginner';
    let vocabularyWords = [];
    let currentWordIndex = 0;
    let currentWord = null;
    let currentStep = 1;
    let stepCompleted = { 1: false, 2: false, 3: false, 4: false, 5: false };
    let masteredWords = JSON.parse(localStorage.getItem('masteredWords') || '[]');
    let totalPoints = parseInt(localStorage.getItem('totalPoints') || '0');
    let streak = parseInt(localStorage.getItem('streak') || '0');
    let scrambledLetters = [];
    let lastSentenceScore = 0;
    
    // ==================== HELPER FUNCTIONS ====================
    function getFlag(code) {
        const lang = AVAILABLE_LANGUAGES.find(l => l.code === code);
        return lang ? lang.flag : '🌍';
    }
    
    function getLanguageName(code) {
        const lang = AVAILABLE_LANGUAGES.find(l => l.code === code);
        return lang ? lang.name : 'English';
    }
    
    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
    
    function triggerConfetti() {
        const colors = ['#667eea', '#764ba2', '#10b981', '#f59e0b', '#ef4444'];
        for (let i = 0; i < 50; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * window.innerWidth + 'px';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.width = Math.random() * 8 + 4 + 'px';
            confetti.style.height = confetti.style.width;
            confetti.style.animationDuration = Math.random() * 2 + 1 + 's';
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 2500);
        }
    }
    
    function updateStats() {
        document.getElementById('totalPoints').textContent = totalPoints;
        document.getElementById('streakCount').textContent = streak;
        document.getElementById('masteredCount').textContent = masteredWords.length;
        document.getElementById('totalWords').textContent = vocabularyWords.length;
        
        localStorage.setItem('totalPoints', totalPoints);
        localStorage.setItem('streak', streak);
        localStorage.setItem('masteredWords', JSON.stringify(masteredWords));
        
        const progressPercent = vocabularyWords.length > 0 ? (masteredWords.length / vocabularyWords.length) * 100 : 0;
        document.getElementById('progressFill').style.width = progressPercent + '%';
        document.getElementById('progressPercent').textContent = Math.round(progressPercent) + '%';
    }
    
    function speakWord(word) {
        if (!('speechSynthesis' in window)) {
            showToast('Voice not supported', 'info');
            return;
        }
        const utterance = new SpeechSynthesisUtterance(word);
        const langMap = { en: 'en-US', es: 'es-ES', fr: 'fr-FR', de: 'de-DE', it: 'it-IT', pt: 'pt-PT', sw: 'sw-KE' };
        utterance.lang = langMap[currentLanguage] || 'en-US';
        utterance.rate = 0.8;
        speechSynthesis.cancel();
        speechSynthesis.speak(utterance);
    }
    
    // ==================== FETCH VOCABULARY FROM JSON ====================
    async function loadVocabulary() {
        const card = document.getElementById('learningCard');
        card.innerHTML = '<div style="text-align: center; padding: 40px;"><div class="loading-spinner"></div><p style="margin-top: 15px;">Loading words...</p></div>';
        
        try {
            const response = await fetch(`${API_BASE}/words/${currentLanguage}`);
            const data = await response.json();
            
            if (data.success && data.words) {
                let words = data.words;
                
                if (currentLevel !== 'all') {
                    words = words.filter(w => w.level === currentLevel);
                }
                
                if (words.length === 0) {
                    words = data.words;
                }
                
                vocabularyWords = words.map(w => ({
                    id: w.id || w.word,
                    word: w.word || w.text,
                    meaning: w.meaning || `Definition of ${w.word}`,
                    example: w.example || `This is an example using "${w.word}".`,
                    tip: w.tip || `Learn more about "${w.word}"`,
                    level: w.level || 'beginner',
                    part_of_speech: w.part_of_speech || 'noun'
                }));
                
                vocabularyWords.sort(() => Math.random() - 0.5);
                
                console.log(`✅ Loaded ${vocabularyWords.length} words for ${getLanguageName(currentLanguage)}`);
                updateStats();
                resetLearning();
            } else {
                throw new Error('No words returned');
            }
        } catch (error) {
            console.error('Error loading vocabulary:', error);
            card.innerHTML = `<div style="text-align: center; padding: 40px;">
                <div style="font-size: 3rem;">⚠️</div>
                <p>Could not load words.</p>
                <button class="btn btn-primary" onclick="loadVocabulary()" style="margin-top: 15px;">🔄 Retry</button>
            </div>`;
        }
    }
    
    function resetLearning() {
        currentStep = 1;
        stepCompleted = { 1: false, 2: false, 3: false, 4: false, 5: false };
        updateStepsUI();
        loadCurrentWord();
    }
    
    function loadCurrentWord() {
        if (currentWordIndex >= vocabularyWords.length) {
            document.getElementById('learningCard').innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <div style="font-size: 4rem;">🏆🎉</div>
                    <h2>Congratulations!</h2>
                    <p>You've completed all ${vocabularyWords.length} words!</p>
                    <button class="btn btn-primary" onclick="location.reload()" style="margin-top: 15px;">Start New Session</button>
                </div>
            `;
            return;
        }
        
        currentWord = vocabularyWords[currentWordIndex];
        updateStepsUI();
        renderStep1();
    }
    
    function updateStepsUI() {
        const steps = document.querySelectorAll('#stepsContainer .step');
        steps.forEach((step, idx) => {
            const stepNum = idx + 1;
            step.classList.remove('active', 'completed');
            if (stepCompleted[stepNum]) step.classList.add('completed');
            if (stepNum === currentStep) step.classList.add('active');
        });
    }
    
    function goToStep(step) {
        if (step > 1 && !stepCompleted[step - 1]) {
            showToast(`Complete previous step first!`, 'info');
            return;
        }
        currentStep = step;
        updateStepsUI();
        
        switch(step) {
            case 1: renderStep1(); break;
            case 2: renderStep2(); break;
            case 3: renderStep3(); break;
            case 4: renderStep4(); break;
            case 5: renderStep5(); break;
            case 6: renderStep6(); break;
        }
    }
    
    // ==================== STEP 1: SEE & LEARN ====================
    function renderStep1() {
        const posInfo = POS_INFO[currentWord.part_of_speech] || POS_INFO.noun;
        
        document.getElementById('learningCard').innerHTML = `
            <div class="word-display">
                <div class="word-text">${escapeHtml(currentWord.word)}</div>
                <span class="pos-badge" style="background: ${posInfo.color}">${posInfo.label}</span>
            </div>
            <div class="meaning-box">
                <div class="meaning-text">📖 ${escapeHtml(currentWord.meaning)}</div>
            </div>
            <div class="example-box" onclick="saveExample()">
                <div>💬 "${escapeHtml(currentWord.example)}"</div>
                <div style="font-size: 0.65rem; margin-top: 6px;">⬅️ Click to save</div>
            </div>
            <div class="tip-box">
                💡 ${escapeHtml(currentWord.tip || `"${currentWord.word}" is a ${posInfo.label}. ${posInfo.description}`)}
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="speakWord('${escapeHtml(currentWord.word)}')">🔊 Listen</button>
                <button class="btn btn-success" onclick="completeStep1()">✅ Understand →</button>
            </div>
        `;
    }
    
    function saveExample() {
        localStorage.setItem('savedExample', currentWord.example);
        showToast('💡 Example saved!');
    }
    
    function completeStep1() {
        stepCompleted[1] = true;
        totalPoints += 10;
        updateStats();
        triggerConfetti();
        goToStep(2);
    }
    
    // ==================== STEP 2: SPELL ====================
    function renderStep2() {
        document.getElementById('learningCard').innerHTML = `
            <div class="meaning-box">
                <div class="meaning-text">📖 ${escapeHtml(currentWord.meaning)}</div>
            </div>
            <input type="text" id="spellInput" class="input-field" placeholder="Type the word..." autocomplete="off">
            <div id="spellFeedback"></div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="checkSpelling()">✓ Check</button>
                <button class="btn btn-outline" onclick="speakWord('${escapeHtml(currentWord.word)}')">🔊 Listen</button>
            </div>
        `;
        document.getElementById('spellInput')?.focus();
    }
    
    function checkSpelling() {
        const userAnswer = document.getElementById('spellInput').value.trim().toLowerCase();
        const correct = currentWord.word.toLowerCase();
        const feedback = document.getElementById('spellFeedback');
        
        if (userAnswer === correct) {
            feedback.innerHTML = '<div class="feedback correct">✅ Perfect! +15 points</div>';
            totalPoints += 15;
            stepCompleted[2] = true;
            updateStats();
            triggerConfetti();
            setTimeout(() => goToStep(3), 1000);
        } else {
            feedback.innerHTML = `<div class="feedback wrong">❌ Correct: "${escapeHtml(currentWord.word)}"</div>`;
            streak = 0;
            updateStats();
        }
    }
    
    // ==================== STEP 3: MEANING ====================
    function renderStep3() {
        const otherMeanings = vocabularyWords.filter(w => w.word !== currentWord.word).map(w => w.meaning).slice(0, 3);
        const options = [currentWord.meaning, ...otherMeanings];
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        
        document.getElementById('learningCard').innerHTML = `
            <div class="word-display">
                <div class="word-text" style="font-size: 2rem;">${escapeHtml(currentWord.word)}</div>
            </div>
            <div style="text-align: center; margin: 15px 0;">❓ What does this mean?</div>
            <div class="choices" id="meaningChoices">
                ${options.map(opt => `<div class="choice" onclick="checkMeaning('${escapeHtml(opt)}')">${escapeHtml(opt)}</div>`).join('')}
            </div>
            <div id="meaningFeedback"></div>
        `;
    }
    
    function checkMeaning(selected) {
        const isCorrect = selected === currentWord.meaning;
        const feedback = document.getElementById('meaningFeedback');
        const choices = document.querySelectorAll('.choice');
        
        if (isCorrect) {
            feedback.innerHTML = '<div class="feedback correct">✅ Correct! +20 points</div>';
            totalPoints += 20;
            stepCompleted[3] = true;
            updateStats();
            triggerConfetti();
            setTimeout(() => goToStep(4), 1000);
        } else {
            feedback.innerHTML = `<div class="feedback wrong">❌ Correct: "${escapeHtml(currentWord.meaning)}"</div>`;
            streak = 0;
            updateStats();
            choices.forEach(c => {
                if (c.textContent === currentWord.meaning) c.classList.add('correct');
                if (c.textContent === selected) c.classList.add('wrong');
            });
        }
    }
    
    // ==================== STEP 4: UNSCRAMBLE ====================
    function renderStep4() {
        const word = currentWord.word;
        scrambledLetters = word.split('');
        for (let i = scrambledLetters.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [scrambledLetters[i], scrambledLetters[j]] = [scrambledLetters[j], scrambledLetters[i]];
        }
        
        document.getElementById('learningCard').innerHTML = `
            <div style="text-align: center; margin-bottom: 15px;">🔄 Unscramble:</div>
            <div class="scramble-area">
                ${scrambledLetters.map((l, i) => `<div class="scramble-letter" data-idx="${i}">${l}</div>`).join('')}
            </div>
            <input type="text" id="scrambleInput" class="input-field" placeholder="Type unscrambled word...">
            <div id="scrambleFeedback"></div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="checkScramble()">✓ Check</button>
                <button class="btn btn-outline" onclick="getScrambleHint()">💡 Hint</button>
            </div>
        `;
    }
    
    function getScrambleHint() {
        const word = currentWord.word;
        document.getElementById('scrambleFeedback').innerHTML = `<div class="feedback info">💡 Hint: ${word[0]}${'_'.repeat(word.length-2)}${word[word.length-1]} (${word.length} letters)</div>`;
    }
    
    function checkScramble() {
        const userAnswer = document.getElementById('scrambleInput').value.trim().toLowerCase();
        const correct = currentWord.word.toLowerCase();
        const feedback = document.getElementById('scrambleFeedback');
        
        if (userAnswer === correct) {
            feedback.innerHTML = '<div class="feedback correct">✅ Correct! +25 points</div>';
            totalPoints += 25;
            stepCompleted[4] = true;
            updateStats();
            triggerConfetti();
            setTimeout(() => goToStep(5), 1000);
        } else {
            feedback.innerHTML = `<div class="feedback wrong">❌ The word is "${escapeHtml(correct)}"</div>`;
        }
    }
    
    // ==================== STEP 5: WRITE ====================
    function renderStep5() {
        const savedExample = localStorage.getItem('savedExample') || '';
        document.getElementById('learningCard').innerHTML = `
            <div class="meaning-box">
                <div class="meaning-text">"${escapeHtml(currentWord.word)}" means: ${escapeHtml(currentWord.meaning)}</div>
            </div>
            <textarea id="sentenceInput" rows="3" placeholder='Write a sentence using "${escapeHtml(currentWord.word)}"...'>${escapeHtml(savedExample)}</textarea>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="checkSentenceWithAI()">🤖 Check</button>
                <button class="btn btn-success" id="submitWriteBtn" style="display:none;" onclick="completeStep5()">✅ Submit</button>
            </div>
            <div id="writeFeedback"></div>
        `;
    }
    
    function checkSentenceWithAI() {
        const sentence = document.getElementById('sentenceInput').value.trim();
        const feedbackDiv = document.getElementById('writeFeedback');
        
        if (!sentence) {
            feedbackDiv.innerHTML = '<div class="feedback info">⚠️ Write a sentence first!</div>';
            return;
        }
        
        let score = 100;
        let issues = [];
        let positives = [];
        
        if (!sentence.toLowerCase().includes(currentWord.word.toLowerCase())) {
            score -= 40;
            issues.push(`Missing "${currentWord.word}"`);
        } else {
            positives.push(`✅ Used "${currentWord.word}"`);
        }
        
        if (sentence && sentence[0] !== sentence[0].toUpperCase()) {
            score -= 10;
            issues.push("Start with capital letter");
        } else {
            positives.push("✅ Capitalized");
        }
        
        if (sentence && !/[.!?]$/.test(sentence)) {
            score -= 10;
            issues.push("Add punctuation");
        } else {
            positives.push("✅ Punctuation");
        }
        
        const wordCount = sentence.split(' ').filter(w => w.length > 0).length;
        if (wordCount < 3) {
            score -= 20;
            issues.push(`Too short (${wordCount} words)`);
        } else {
            positives.push(`✅ ${wordCount} words`);
        }
        
        score = Math.max(0, Math.min(100, score));
        lastSentenceScore = score;
        
        feedbackDiv.innerHTML = `<div class="feedback ${score >= 70 ? 'correct' : 'info'}">
            <strong>Score: ${score}/100</strong><br>
            "${escapeHtml(sentence.substring(0, 100))}"<br>
            ${positives.join(' • ')}${issues.length ? `<br>⚠️ ${issues.join(', ')}` : ''}
        </div>`;
        
        const submitBtn = document.getElementById('submitWriteBtn');
        if (submitBtn) submitBtn.style.display = score >= 70 ? 'inline-block' : 'none';
    }
    
    function completeStep5() {
        totalPoints += lastSentenceScore;
        stepCompleted[5] = true;
        updateStats();
        triggerConfetti();
        goToStep(6);
    }
    
    // ==================== STEP 6: USE ====================
    function renderStep6() {
        document.getElementById('learningCard').innerHTML = `
            <div style="text-align: center;">
                <div style="font-size: 2rem; margin-bottom: 15px;">🎯 Complete the Sentence</div>
                <div class="meaning-box">"I want to ____ my vocabulary every day."</div>
                <input type="text" id="blankInput" class="input-field" placeholder="Type the word...">
                <div id="blankFeedback"></div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="checkBlank()">✓ Check</button>
                </div>
            </div>
        `;
        document.getElementById('blankInput')?.focus();
    }
    
    function checkBlank() {
        const userAnswer = document.getElementById('blankInput').value.trim().toLowerCase();
        const correct = currentWord.word.toLowerCase();
        const feedback = document.getElementById('blankFeedback');
        
        if (userAnswer === correct) {
            feedback.innerHTML = '<div class="feedback correct">🎉 Mastered! +30 points</div>';
            if (!masteredWords.includes(currentWord.word)) {
                masteredWords.push(currentWord.word);
                totalPoints += 30;
                updateStats();
                triggerConfetti();
                // Track activity for dashboard
                trackVocabularyActivity(currentWord.word);
            }
            
            // Auto-advance to next word after celebration
            setTimeout(() => { 
                currentWordIndex++;
                
                if (currentWordIndex < vocabularyWords.length) {
                    // Load next word
                    currentStep = 1;
                    stepCompleted = { 1: false, 2: false, 3: false, 4: false, 5: false };
                    updateStepsUI();
                    loadCurrentWord();
                    showToast(`Next word: ${vocabularyWords[currentWordIndex]?.word || 'Loading...'}`, 'info');
                } else {
                    // All words completed
                    document.getElementById('learningCard').innerHTML = `
                        <div style="text-align: center; padding: 40px;">
                            <div style="font-size: 4rem;">🏆🎉</div>
                            <h2>Congratulations!</h2>
                            <p>You've mastered all ${vocabularyWords.length} words!</p>
                            <button class="btn btn-primary" onclick="location.reload()" style="margin-top: 15px;">Start New Session</button>
                        </div>
                    `;
                }
            }, 2000);
        } else {
            feedback.innerHTML = `<div class="feedback wrong">❌ Correct word: "${escapeHtml(correct)}"</div>`;
            streak = 0;
            updateStats();
            
            // Clear feedback after 3 seconds
            setTimeout(() => {
                if (feedback.innerHTML.includes('❌')) {
                    feedback.innerHTML = '';
                    feedback.className = 'feedback';
                }
            }, 3000);
        }
    }
    
    // ==================== UI SETUP ====================
    function setupLanguageSelector() {
        const container = document.getElementById('languageSelector');
        container.innerHTML = AVAILABLE_LANGUAGES.map(lang => `
            <div class="lang-chip ${lang.code === currentLanguage ? 'active' : ''}" data-lang="${lang.code}">
                ${lang.flag} ${lang.name}
            </div>
        `).join('');
        
        document.querySelectorAll('.lang-chip').forEach(chip => {
            chip.addEventListener('click', async () => {
                currentLanguage = chip.dataset.lang;
                localStorage.setItem('preferredLanguage', currentLanguage);
                sessionStorage.setItem('selectedLanguage', currentLanguage);
                document.getElementById('languageInfo').innerHTML = `${getFlag(currentLanguage)} Learning ${getLanguageName(currentLanguage)}`;
                setupLanguageSelector();
                await loadVocabulary();
                showToast(`Switched to ${getLanguageName(currentLanguage)}`);
            });
        });
    }
    
    function setupLevelSelector() {
        const container = document.getElementById('levelSelector');
        container.innerHTML = LEVELS.map(level => `
            <button class="level-btn ${level === currentLevel ? 'active' : ''}" data-level="${level}">${LEVEL_NAMES[level]}</button>
        `).join('');
        
        document.querySelectorAll('.level-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                currentLevel = btn.dataset.level;
                localStorage.setItem('userLevel', currentLevel);
                setupLevelSelector();
                await loadVocabulary();
            });
        });
    }
    
    function setupSteps() {
        document.querySelectorAll('#stepsContainer .step').forEach(step => {
            step.addEventListener('click', () => goToStep(parseInt(step.dataset.step)));
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }
    
    // ==================== INITIALIZATION ====================
    document.getElementById('languageInfo').innerHTML = `${getFlag(currentLanguage)} Learning ${getLanguageName(currentLanguage)}`;
    setupLanguageSelector();
    setupLevelSelector();
    setupSteps();
    
    // Make functions global
    window.speakWord = speakWord;
    window.saveExample = saveExample;
    window.completeStep1 = completeStep1;
    window.checkSpelling = checkSpelling;
    window.checkMeaning = checkMeaning;
    window.getScrambleHint = getScrambleHint;
    window.checkScramble = checkScramble;
    window.checkSentenceWithAI = checkSentenceWithAI;
    window.completeStep5 = completeStep5;
    window.checkBlank = checkBlank;
    window.goToStep = goToStep;
    window.loadVocabulary = loadVocabulary;
    
    // Start
    loadVocabulary();
</script>
</body>
</html>
