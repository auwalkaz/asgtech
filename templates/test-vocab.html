<!DOCTYPE html>
<html>
<head>
    <title>Vocabulary API Test</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f4f8; }
        .word-card { background: white; padding: 15px; margin: 10px; border-radius: 10px; border-left: 4px solid #4f46e5; }
        button { background: #4f46e5; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        select { padding: 8px; margin: 5px; border-radius: 5px; border: 1px solid #ccc; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .error { color: red; padding: 20px; text-align: center; }
        .success { color: green; }
        .stats { background: #e0e7ff; padding: 10px; border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>📚 Vocabulary API Test</h1>
    
    <div class="stats">
        <p><strong>API Status:</strong> <span id="apiStatus">Testing...</span></p>
    </div>
    
    <div>
        <label>Language:</label>
        <select id="languageSelect">
            <option value="en">🇬🇧 English</option>
            <option value="sw">🇹🇿 Swahili</option>
            <option value="fr">🇫🇷 French</option>
            <option value="es">🇪🇸 Spanish</option>
            <option value="ar">🇸🇦 Arabic</option>
            <option value="pt">🇵🇹 Portuguese</option>
        </select>
        
        <label>Level:</label>
        <select id="levelSelect">
            <option value="all">All Levels</option>
            <option value="beginner">🌱 Beginner</option>
            <option value="intermediate">📚 Intermediate</option>
            <option value="advanced">🚀 Advanced</option>
        </select>
        
        <button onclick="fetchVocab()">Load Vocabulary</button>
        <button onclick="testAPI()">Test API</button>
    </div>
    
    <div id="results" class="loading">Select a language and click Load...</div>
    
    <script>
        async function testAPI() {
            const resultsDiv = document.getElementById('results');
            const apiStatus = document.getElementById('apiStatus');
            
            resultsDiv.innerHTML = '<div class="loading">🔌 Testing API...</div>';
            
            try {
                const response = await fetch('/api/json/en');
                const data = await response.json();
                
                if (data.success) {
                    apiStatus.innerHTML = '<span class="success">✅ API Working! JSON loaded successfully</span>';
                    resultsDiv.innerHTML = `<div class="success">✅ API Test Passed!<br>📚 Found ${data.count} English words</div>`;
                } else {
                    apiStatus.innerHTML = '<span style="color: red;">❌ API Error</span>';
                    resultsDiv.innerHTML = `<div class="error">❌ ${data.error}</div>`;
                }
            } catch (error) {
                apiStatus.innerHTML = '<span style="color: red;">❌ Cannot connect</span>';
                resultsDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }
        
        async function fetchVocab() {
            const language = document.getElementById('languageSelect').value;
            const level = document.getElementById('levelSelect').value;
            const resultsDiv = document.getElementById('results');
            
            resultsDiv.innerHTML = '<div class="loading">📖 Loading vocabulary...</div>';
            
            try {
                let url = `/api/json/${language}`;
                if (level !== 'all') {
                    url += `?level=${level}`;
                }
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.success && data.words) {
                    resultsDiv.innerHTML = `
                        <h3>${language.toUpperCase()} - ${level} (${data.count} words)</h3>
                        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px;">
                            ${data.words.slice(0, 20).map(word => `
                                <div class="word-card">
                                    <strong style="font-size: 1.2rem;">${word.word}</strong><br>
                                    <em>📖 ${word.meaning || 'No meaning'}</em><br>
                                    <small>💬 ${word.example || 'No example'}</small><br>
                                    <span style="color: #666; font-size: 0.8rem;">📚 ${word.part_of_speech || 'word'}</span>
                                    <span style="color: #f59e0b; font-size: 0.8rem;">⭐ ${word.level || 'beginner'}</span>
                                </div>
                            `).join('')}
                        </div>
                        ${data.words.length > 20 ? `<p>... and ${data.words.length - 20} more words</p>` : ''}
                    `;
                } else {
                    resultsDiv.innerHTML = `<div class="error">❌ ${data.error || 'No data found'}</div>`;
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }
        
        // Test API on page load
        testAPI();
    </script>
</body>
</html>
