<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - Astech</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }
        .container {
            background: #1e293b;
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        h1 {
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            background: #0f172a;
            color: white;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .switch {
            margin-top: 20px;
            color: #94a3b8;
        }
        .switch a {
            color: #60a5fa;
            text-decoration: none;
        }
        .dev-login {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #334155;
        }
        .dev-btn {
            background: #8b5cf6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">Login</h1>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <input type="text" id="name" placeholder="Full Name" style="display: none;">
        <button id="submitBtn">Login</button>
        <div class="switch">
            <span id="switchText">Don't have an account? </span>
            <a href="#" id="switchLink">Register</a>
        </div>
        <div class="dev-login">
            <button class="dev-btn" onclick="location.href='/dev-login'">🚀 Quick Dev Login (Premium)</button>
        </div>
    </div>
    <script>
        let isLogin = true;
        const title = document.getElementById('title');
        const nameInput = document.getElementById('name');
        const submitBtn = document.getElementById('submitBtn');
        const switchText = document.getElementById('switchText');
        const switchLink = document.getElementById('switchLink');

        switchLink.onclick = (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            if (isLogin) {
                title.textContent = 'Login';
                nameInput.style.display = 'none';
                submitBtn.textContent = 'Login';
                switchText.textContent = "Don't have an account? ";
                switchLink.textContent = 'Register';
            } else {
                title.textContent = 'Register';
                nameInput.style.display = 'block';
                submitBtn.textContent = 'Register';
                switchText.textContent = "Already have an account? ";
                switchLink.textContent = 'Login';
            }
        };

        submitBtn.onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;

            if (isLogin) {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/';
                } else {
                    alert(data.error);
                }
            } else {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, name })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/';
                } else {
                    alert(data.error);
                }
            }
        };
    </script>
</body>
</html>
